name: Deploy web version to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# если пушнули дважды подряд — катим только последнюю версию
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # base обязателен: сайт живёт не в корне домена, а в подпапке
      # /nepokerist-ranges/, и без него ссылки на ассеты уедут в 404.
      # Десктопную сборку это не трогает — там свой vite build с base по умолчанию.
      - name: Build web bundle
        run: npx vite build --base=/nepokerist-ranges/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
