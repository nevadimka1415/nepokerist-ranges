<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Редактор покерных спектров</title>
    <meta name="description" content="Редактор покерных диапазонов и калькулятор эквити" />
    <meta name="theme-color" content="#2d8fd5" />

    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- iOS не читает manifest — иконку и полноэкранный режим просит отдельными тегами.
         Добавление на экран «Домой» важно ещё и потому, что Safari чистит
         localStorage у обычных сайтов после 7 дней без визитов, а у веб-обёртки,
         установленной с экрана «Домой», данные сохраняются. Иначе человек
         рискует потерять свои спектры. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Спектры" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="./icons/128x128@2x.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
